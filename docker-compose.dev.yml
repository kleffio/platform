name: kleff-dev

# Development overrides — hot reload where supported.
# Usage: docker compose -f docker-compose.dev.yml up --build

services:
  # ── Frontend ─────────────────────────────────────────────────────────────────
  # Runs the Vite dev server directly for HMR instead of the nginx static build.
  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./apps/dashboard:/app/apps/dashboard
      - ./packages:/app/packages
      # Prevent host node_modules from shadowing the container's
      - /app/apps/dashboard/node_modules
      - /app/node_modules
    environment:
      - VITE_OIDC_AUTHORITY=${VITE_OIDC_AUTHORITY:-}
      - VITE_OIDC_CLIENT_ID=${VITE_OIDC_CLIENT_ID:-}
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8083}

  # ── Backend Services ──────────────────────────────────────────────────────────
  # Go services mount source and rebuild on container start.
  # For live reload, install https://github.com/air-verse/air and override CMD.
  identity-service:
    build:
      context: .
      dockerfile: services/identity-service/Dockerfile
    ports:
      - "8083:8080"
    volumes:
      - ./services/identity-service:/app/services/identity-service
      - ./packages/go-common:/app/packages/go-common

  billing-service:
    build:
      context: .
      dockerfile: services/billing-service/Dockerfile
    ports:
      - "8081:8080"
    volumes:
      - ./services/billing-service:/app/services/billing-service
      - ./packages/go-common:/app/packages/go-common

  gameserver-service:
    build:
      context: .
      dockerfile: services/gameserver-service/Dockerfile
    ports:
      - "8082:8080"
    volumes:
      - ./services/gameserver-service:/app/services/gameserver-service
      - ./packages/go-common:/app/packages/go-common

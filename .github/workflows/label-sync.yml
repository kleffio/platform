---
name: Label Sync
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  issues: write

jobs:
  label-sync:
    name: Label Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EndBug/label-sync@v2
        with:
          config-file: .github/labels.json
          delete-other-labels: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

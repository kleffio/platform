---
name: CI Checks
"on":
  push:
    branches: ["**"]
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write
  security-events: write
  id-token: write

jobs:
  # --- PR-specific ---
  auto-label:
    name: Auto Label PR
    if: github.event_name == 'pull_request'
    uses: kleffio/.github/.github/workflows/_auto-label.yml@main
    with:
      unified_path: configs/labels.json

  pr-title:
    name: PR Title Check
    if: github.event_name == 'pull_request'
    needs: [auto-label]
    uses: kleffio/.github/.github/workflows/_pr-title.yml@main
    with:
      unified_path: configs/labels.json

  require-label:
    name: Require Label
    if: github.event_name == 'pull_request'
    needs: [auto-label]
    uses: kleffio/.github/.github/workflows/_require-label.yml@main
    with:
      unified_path: configs/labels.json

  # --- Main-only ---
  label-sync:
    name: Label Sync
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: kleffio/.github/.github/workflows/_label-sync.yml@main
    with:
      unified_path: configs/labels.json
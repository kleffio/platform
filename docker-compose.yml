name: kleff

services:
  # ── Frontend ─────────────────────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
      args:
        VITE_OIDC_AUTHORITY: ${VITE_OIDC_AUTHORITY:-}
        VITE_OIDC_CLIENT_ID: ${VITE_OIDC_CLIENT_ID:-}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8083}
    ports:
      - "3000:80"
    depends_on:
      - identity-service
      - billing-service
      - gameserver-service
    restart: unless-stopped

  # ── Backend Services ──────────────────────────────────────────────────────────
  identity-service:
    build:
      context: .
      dockerfile: services/identity-service/Dockerfile
    ports:
      - "8083:8080"
    restart: on-failure

  billing-service:
    build:
      context: .
      dockerfile: services/billing-service/Dockerfile
    ports:
      - "8081:8080"
    restart: on-failure

  gameserver-service:
    build:
      context: .
      dockerfile: services/gameserver-service/Dockerfile
    ports:
      - "8082:8080"
    restart: on-failure
